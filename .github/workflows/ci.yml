name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

  household-agenda-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Household agenda gate (logged + checked)
        run: npm run test:household:agenda:gate:ci

      - name: Upload household agenda gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: household-agenda-gate-latest
          path: |
            .tmp/household-agenda-suites-latest.log
            .tmp/household-agenda-suites-latest.json
          if-no-files-found: error

  db-runtime-contracts:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: suka
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d suka"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/suka
      MONGODB_URI: mongodb://127.0.0.1:27017/suka
      SSA_ENABLE_DB_RUNTIME_CONTRACT_TESTS: "true"
      PLANNER_OPERATIONAL_OUTBOX_WORKER_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: DB preflight gate
        run: npm run db:preflight

      - name: Nutrition Mongo adapter contract
        run: npx vitest run _tests_/nutritionMongoAdapter.contract.test.js --reporter=verbose

      - name: Integration preflight Neo4j contract
        run: npx vitest run _tests_/integrationPreflight.neo4j.contract.test.js --reporter=verbose

      - name: Startup health payload contract
        run: npx vitest run _tests_/serverStartup.dbmode.contract.test.js --reporter=verbose

  runtime-contracts:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: suka
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d suka"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/suka
      MONGODB_URI: mongodb://127.0.0.1:27017/suka
      SSA_ENABLE_RUNTIME_CONTRACT_TESTS: "true"
      SSA_ENABLE_DB_RUNTIME_CONTRACT_TESTS: "true"
      PLANNER_OPERATIONAL_OUTBOX_WORKER_DISABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Realtime runtime contracts
        run: npx vitest run _tests_/realtimeController.runtime.contract.test.js --reporter=verbose

  runtime-contracts-strict-entitlement:
    runs-on: ubuntu-latest
    env:
      STRICT_PLANNER_BASE_ENTITLEMENT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strict entitlement contract suite
        run: npx vitest run _tests_/accessPolicy.entitlement.contract.test.js --reporter=verbose

  auth-contracts-windows:
    runs-on: windows-latest
    env:
      NEO4J_REQUIRED: "false"
      POSTGRES_REQUIRED: "false"
      MONGODB_REQUIRED: "false"
      STRICT_STARTUP_ENV: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auth contract on Windows with explicit artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .artifacts | Out-Null
          node .\node_modules\vitest\vitest.mjs run _tests_/authController.contract.test.js --reporter=verbose --reporter=json --outputFile=.artifacts\auth-controller-contract-vitest.json 2>&1 | Tee-Object -FilePath .artifacts\auth-controller-contract-vitest.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload auth contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-controller-contract-windows
          path: |
            .artifacts/auth-controller-contract-vitest.log
            .artifacts/auth-controller-contract-vitest.json
          if-no-files-found: error

  auth-env-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auth production env readiness checks
        run: node tools/scripts/check-auth-env-readiness.cjs

  policy-audit-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Access policy audit contracts
        run: >-
          npx vitest run
          _tests_/accessPolicyAdmin.audit.contract.test.js
          _tests_/accessPolicyAudit.alerts.contract.test.js
          _tests_/accessPolicyAudit.maintenance.contract.test.js
          _tests_/accessPolicyAudit.anomalies.contract.test.js
          --reporter=verbose

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest default mode
        env:
          SSA_ENABLE_LEGACY_CONTRACT_TESTS: "false"
        run: npm run test:ci

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (scaffold)
        run: npm run lint:ci

      - name: Guard formatter JSX extensions
        run: npm run guard:formatter-jsx

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (scaffold)
        run: npm run typecheck:ci

  smoke-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Basic smoke e2e
        run: npm run smoke:e2e

      - name: Consolidated smoke contracts
        run: npm run smoke:consolidated

      - name: Validate consolidated smoke artifact
        run: npm run smoke:consolidated:check

      - name: Upload consolidated smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-smoke-contract-report-latest
          path: docs/qa/consolidated-smoke-contract-report-latest.json
          if-no-files-found: error

      - name: Run automated browser smoke rerun + schema
        run: npm run smoke:browser:rerun

      - name: Browser smoke check (policy-controlled)
        env:
          BROWSER_SMOKE_STRICT: ${{ vars.BROWSER_SMOKE_STRICT }}
        run: |
          if [ "${BROWSER_SMOKE_STRICT:-false}" = "true" ]; then
            npm run smoke:browser:check:strict
          else
            npm run smoke:browser:check
          fi

      - name: Upload browser latest report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-smoke-browser-report-latest
          path: docs/qa/consolidated-smoke-browser-report-latest.json
          if-no-files-found: error

      - name: Upload browser check summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-smoke-browser-check-summary
          path: docs/qa/consolidated-smoke-browser-check-summary-latest.json
          if-no-files-found: error

      - name: Upload browser rerun report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-smoke-browser-rerun-report
          path: docs/qa/consolidated-smoke-report-rerun-latest.json
          if-no-files-found: error

  post-merge-runtime-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - build
      - db-runtime-contracts
      - runtime-contracts
      - runtime-contracts-strict-entitlement
      - auth-contracts-windows
      - auth-env-readiness
      - policy-audit-contracts
      - unit-tests
      - lint
      - typecheck
      - smoke-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Post-merge startup health contract smoke
        run: npx vitest run _tests_/serverStartup.dbmode.contract.test.js --reporter=verbose

  post-merge-production-health:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - post-merge-runtime-smoke
    runs-on: ubuntu-latest
    env:
      PRODUCTION_HEALTH_URL: ${{ secrets.PRODUCTION_HEALTH_URL }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify protected production health contract
        if: env.PRODUCTION_HEALTH_URL != '' && env.VERCEL_PROTECTION_BYPASS != ''
        env:
          REQUIRE_VERCEL_PROTECTION_BYPASS: "true"
          PRODUCTION_HEALTH_MAX_WAIT_MS: "180000"
          PRODUCTION_HEALTH_RETRY_INTERVAL_MS: "5000"
        run: npm run prod:health:verify

      - name: Skip protected production health contract (missing secrets)
        if: env.PRODUCTION_HEALTH_URL == '' || env.VERCEL_PROTECTION_BYPASS == ''
        run: |
          echo "::warning::Skipping protected production health contract because PRODUCTION_HEALTH_URL or VERCEL_PROTECTION_BYPASS is not configured."
