name: Planner Stability Sweep

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

jobs:
  planner-social-gates:
    runs-on: ubuntu-latest
    env:
      SSA_ENABLE_LEGACY_CONTRACT_TESTS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Planner/social context feed gate
        run: npm run test:social:platform:gate

      - name: Dashboard feed performance gate (S6-T1)
        run: npm run test:dashboard:feed:performance:gate

      - name: Offline draft + retry guarantees gate (S6-T2)
        run: npm run test:mealplanner:offline-draft-retry:gate

      - name: API error envelope gate (S6-T3)
        run: npm run test:api:error-envelope:contract

      - name: Launch metrics and thresholds gate (S6-T4)
        run: npm run test:metrics:launch-gates:contract

      - name: Collaboration attachment + realtime fallback contracts
        run: npm run test:collaboration:attachments:contract && npm run test:collaboration:realtime-fallback:contract

      - name: Onboarding full-cycle contract
        run: npm run test:onboarding:full-cycle:contract

  planner-stability-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ssa_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ssa_planner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Targeted planner regression suite
        run: npm run test:planner:stability

      - name: Planner runtime contracts
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/ssa_planner
          SSA_ENABLE_RUNTIME_CONTRACT_TESTS: "1"
          SSA_ENABLE_DB_RUNTIME_CONTRACT_TESTS: "1"
        run: npx vitest run _tests_/planners.runtime.contract.test.js --reporter=dot
